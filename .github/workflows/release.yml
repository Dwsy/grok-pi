name: Release grok-pi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS ────────────────────────────────────────────────────────
          - name: macOS ARM64
            runner: macos-14
            target: aarch64-apple-darwin
            asset: grok-pi-macos-aarch64.tar.gz
            bin: grok-pi
            cross: false
          - name: macOS Intel
            runner: macos-14
            target: x86_64-apple-darwin
            asset: grok-pi-macos-x86_64.tar.gz
            bin: grok-pi
            # Apple Silicon runners can cross-compile Intel with the right target.
            cross: true

          # ── Linux ────────────────────────────────────────────────────────
          - name: Linux x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: grok-pi-linux-x86_64.tar.gz
            bin: grok-pi
            cross: false
          - name: Linux ARM64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset: grok-pi-linux-aarch64.tar.gz
            bin: grok-pi
            cross: true

          # ── Windows ──────────────────────────────────────────────────────
          - name: Windows x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: grok-pi-windows-x86_64.zip
            bin: grok-pi.exe
            cross: false
          - name: Windows ARM64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            asset: grok-pi-windows-aarch64.zip
            bin: grok-pi.exe
            cross: true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust 1.92.0
        uses: dtolnay/rust-toolchain@1.92.0
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v2-release"
          shared-key: ${{ matrix.name }}

      - name: Install protoc on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes protobuf-compiler
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Install Linux aarch64 cross toolchain
        if: runner.os == 'Linux' && matrix.cross
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          # Tell cargo/cc which linker to use for the aarch64 target.
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"

      - name: Install protoc on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install protobuf
          echo "PROTOC=$(command -v protoc)" >> "$GITHUB_ENV"

      - name: Install protoc on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc --yes --no-progress
          $protoc = (Get-Command protoc).Source
          "PROTOC=$protoc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME:-0.0.0-dev}"
          ver="${ref#v}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Resolved GROK_PI_VERSION=${ver}"

      - name: Build release binary
        shell: bash
        env:
          # Keep the grok-pi product version independent from Grok's
          # release-only GROK_VERSION stamp.
          GROK_PI_VERSION: ${{ steps.version.outputs.version }}
        run: |
          cargo build \
            --profile release-dist \
            -p xai-grok-pager-bin \
            --bin grok-pi \
            --features release-dist \
            --target "${{ matrix.target }}"

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          src="target/${{ matrix.target }}/release-dist/${{ matrix.bin }}"
          test -f "$src"
          # Stage a clean name so tarball root contains just `grok-pi`.
          stage="$(mktemp -d)"
          cp "$src" "$stage/grok-pi"
          chmod 755 "$stage/grok-pi"
          tar -C "$stage" -czf "dist/${{ matrix.asset }}" grok-pi
          ls -lh "dist/${{ matrix.asset }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "target/${{ matrix.target }}/release-dist/${{ matrix.bin }}"
          if (-not (Test-Path -LiteralPath $src)) {
            throw "missing binary: $src"
          }
          # Stage as grok-pi.exe at archive root.
          $stage = Join-Path $env:RUNNER_TEMP "grok-pi-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath $src -Destination (Join-Path $stage "grok-pi.exe") -Force
          Compress-Archive -Path (Join-Path $stage "grok-pi.exe") -DestinationPath "dist/${{ matrix.asset }}" -Force
          Get-Item "dist/${{ matrix.asset }}" | Format-List Name, Length

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Check out release scripts
        uses: actions/checkout@v4

      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Add installer scripts
        shell: bash
        run: |
          cp install.sh install.ps1 release-assets/
          chmod +x release-assets/install.sh
          ls -la release-assets/

      - name: Extract CHANGELOG for this tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          ver="${ref#v}"
          mkdir -p dist

          # Sanity-check the extractor before cutting notes.
          python3 scripts/extract-changelog-section.py --self-test

          # Prefer a single matching section; for early 0.0.x tags also fold in
          # every section after 0.0.6 so users upgrading from 0.0.6 see the full
          # story (0.0.7 + 0.0.8 …). Toggle off with RELEASE_NOTES_SINCE=.
          since_arg=()
          if [[ -z "${RELEASE_NOTES_SINCE+x}" ]]; then
            # default: cumulative notes since 0.0.6 for 0.0.x line
            since_arg=(--since 0.0.6)
          elif [[ -n "${RELEASE_NOTES_SINCE}" ]]; then
            since_arg=(--since "${RELEASE_NOTES_SINCE}")
          fi

          python3 scripts/extract-changelog-section.py \
            "${ver}" \
            CHANGELOG.MD \
            -o dist/release-notes.md \
            --repo "${GITHUB_REPOSITORY}" \
            --strict \
            --with-install \
            "${since_arg[@]}"

          # softprops prepends body_path when generate_release_notes is true.
          printf '\n---\n\n### Commits\n\n' >> dist/release-notes.md

          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "notes_path=dist/release-notes.md" >> "$GITHUB_OUTPUT"
          echo "bytes=$(wc -c < dist/release-notes.md | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "--- release notes preview (first 60 lines) ---"
          head -n 60 dist/release-notes.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md
          if-no-files-found: error

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # CHANGELOG.MD (tag section, optionally cumulative since 0.0.6)
          # then GitHub auto-generated commit list under ### Commits.
          body_path: dist/release-notes.md
          generate_release_notes: true
          files: release-assets/*
